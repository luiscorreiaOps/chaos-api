name: CI Pipeline
on:
  push:
    branches: [ main, develop ]
jobs:
  Security:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
      - name: Snyk Scan
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/python@v0.4.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  Build_and_Test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install and Test
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src:$(pwd)/backend
          python setup.py build
          python setup.py sdist
          python setup.py bdist_wheel
          pip install -e .
          python -m unittest discover -s backend -p 'test_*.py' || echo 'No tests found'
      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarcloud-github-action@v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  Docker:
    runs-on: ubuntu-latest
    needs: Build_and_Test
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t project:0.1.0 .

  Reporting:
    runs-on: ubuntu-latest
    needs: Build_and_Test
    steps:
      - name: Summary
        run: |
          echo '## Project Version: 0.1.0' >> $GITHUB_STEP_SUMMARY